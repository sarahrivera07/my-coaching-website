<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women's Leadership & Empowerment Coaching</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f6f3ee;
color:#2b2b2b;
line-height:1.6;
}

h1,h2,h3{
font-family:'Playfair Display',serif;
}

header{
background:linear-gradient(rgba(20,20,20,0.45),rgba(20,20,20,0.45)),url('https://images.unsplash.com/photo-1556761175-b413da4baf72');
background-size:cover;
background-position:center;
color:white;
text-align:center;
padding:130px 20px;
}

header h1{
font-size:44px;
max-width:850px;
margin:auto;
}

header p{
margin-top:20px;
font-size:20px;
letter-spacing:1px;
color:#e6d3a3;
}

section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

.about{
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
align-items:center;
}

.about img{
width:100%;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
border-top:4px solid #c6a86b;
}

.pricing{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:35px;
margin-top:40px;
}

.price-card{
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 15px 35px rgba(0,0,0,0.10);
text-align:center;
border:1px solid #efe6d6;
}

.price{
font-size:36px;
margin:18px 0;
color:#c6a86b;
font-weight:600;
}

button{
padding:14px 30px;
border:none;
background:#c6a86b;
color:white;
font-size:15px;
border-radius:30px;
cursor:pointer;
margin-top:15px;
letter-spacing:0.5px;
}

button:hover{
opacity:0.9;
}

.cta{
text-align:center
